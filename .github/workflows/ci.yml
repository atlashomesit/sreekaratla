# Status check name for branch protection: build
name: CI
on:
  pull_request:
  push: { branches: [ main ] }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Verify toolchain
        run: |
          node -v
          pnpm -v

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -s typecheck
        continue-on-error: true

      - name: Lint
        run: pnpm -s lint

      - name: Build (Cloudflare Pages)
        run: npx @cloudflare/next-on-pages@1

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=sreekaratla --branch=main

      - name: Pagefind (non-blocking)
        if: always()
        run: node scripts/pagefind-safe.js || true
